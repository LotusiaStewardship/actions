name: Notify Telegram

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify-commit:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send commit notification
        env:
          REPO: ${{ inputs.repo }}
          REF_NAME: ${{ github.ref_name }}
          AUTHOR_NAME: ${{ github.event.commits[0].author.name }}
          COMMIT_URL: ${{ github.event.commits[0].url }}
          COMMIT_MSG: ${{ github.event.commits[0].message }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)

          MSG="📝 New commit in ${REPO}
          Branch: ${REF_NAME}
          Author: ${AUTHOR_NAME}
          Message: ${FIRST_LINE}
          ${COMMIT_URL}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${MSG}\"}"

  notify-merged-pr:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send PR merge notification
        env:
          REPO: ${{ inputs.repo }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HTML_URL: ${{ github.event.pull_request.html_url }}
          ADDITIONS: ${{ github.event.pull_request.additions }}
          DELETIONS: ${{ github.event.pull_request.deletions }}
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="✅ Pull request merged in ${REPO}
          #${PR_NUMBER}: ${PR_TITLE}
          Author: ${PR_AUTHOR}
          Changes: +${ADDITIONS} / -${DELETIONS} (${CHANGED_FILES} files)
          ${PR_HTML_URL}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${MSG}\"}"
