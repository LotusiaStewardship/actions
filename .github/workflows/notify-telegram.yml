name: Notify Telegram

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify-commit:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send commit notification
        env:
          REPO: ${{ inputs.repo }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          AUTHOR_NAME: ${{ github.event.commits[0].author.name }}
          COMMIT_URL: ${{ github.event.commits[0].url }}
          COMMIT_MSG: ${{ github.event.commits[0].message }}
          ADDED: ${{ toJSON(github.event.commits[0].added) }}
          REMOVED: ${{ toJSON(github.event.commits[0].removed) }}
          MODIFIED: ${{ toJSON(github.event.commits[0].modified) }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)

          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          BODY=$(echo "$COMMIT_MSG" | tail -n +2 | sed '/^$/d' | head -5)

          ADDED_COUNT=$(echo "$ADDED" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          REMOVED_COUNT=$(echo "$REMOVED" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          MODIFIED_COUNT=$(echo "$MODIFIED" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")

          MSG="<b>New commit in ${REPO}</b>

          Branch: <code>${REF_NAME}</code>
          Author: ${AUTHOR_NAME}
          Commit: <a href=\"${COMMIT_URL}\"><code>${SHORT_SHA}</code></a>

          <b>Message:</b>
          ${FIRST_LINE}"

          if [ -n "$BODY" ]; then
            MSG="${MSG}

          ${BODY}"
          fi

          MSG="${MSG}

          <b>Files changed:</b> ${ADDED_COUNT} added, ${REMOVED_COUNT} removed, ${MODIFIED_COUNT} modified

          <a href=\"${COMMIT_URL}\">View on GitHub</a>"

          ESCAPED_MSG=$(printf '%s' "$MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          PAYLOAD=$(jq -n \
            --arg chat "$TELEGRAM_CHAT_ID" \
            --arg text "$ESCAPED_MSG" \
            '{chat_id: $chat, parse_mode: "HTML", text: $text, disable_web_page_preview: true}')

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  notify-merged-pr:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send PR merge notification
        env:
          REPO: ${{ inputs.repo }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_HTML_URL: ${{ github.event.pull_request.html_url }}
          ADDITIONS: ${{ github.event.pull_request.additions }}
          DELETIONS: ${{ github.event.pull_request.deletions }}
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          COMMENTS: ${{ github.event.pull_request.comments }}
          REVIEW_COMMENTS: ${{ github.event.pull_request.review_comments }}
          LABELS: ${{ toJSON(github.event.pull_request.labels) }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA=$(echo "$MERGE_SHA" | cut -c1-7)

          BODY_PREVIEW=$(echo "$PR_BODY" | sed '/^$/d' | head -5)

          LABEL_LIST=$(echo "$LABELS" | python3 -c "
          import sys, json
          labels = json.load(sys.stdin)
          if labels:
              print(', '.join(l['name'] for l in labels))
          else:
              print('none')
          " 2>/dev/null || echo "none")

          MSG="<b>Pull request merged in ${REPO}</b>

          #${PR_NUMBER}: ${PR_TITLE}
          Author: ${PR_AUTHOR}
          Merged by: ${PR_MERGED_BY}
          Merge commit: <a href=\"${PR_HTML_URL}/commits/${MERGE_SHA}\"><code>${SHORT_SHA}</code></a>

          <b>Changes:</b> +${ADDITIONS} / -${DELETIONS}
          Files changed: ${CHANGED_FILES}
          Comments: ${COMMENTS} | Review comments: ${REVIEW_COMMENTS}
          Labels: ${LABEL_LIST}"

          if [ -n "$BODY_PREVIEW" ]; then
            MSG="${MSG}

          <b>Description:</b>
          ${BODY_PREVIEW}"
          fi

          MSG="${MSG}

          <a href=\"${PR_HTML_URL}\">View PR</a>
          <a href=\"${PR_HTML_URL}/files\">View diff</a>"

          ESCAPED_MSG=$(printf '%s' "$MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          PAYLOAD=$(jq -n \
            --arg chat "$TELEGRAM_CHAT_ID" \
            --arg text "$ESCAPED_MSG" \
            '{chat_id: $chat, parse_mode: "HTML", text: $text, disable_web_page_preview: true}')

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
